name: Release Windows

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.2.0). Leave blank for a development build.'
        required: false
      publish:
        description: 'Publish to GitHub Releases (creates a tag if needed).'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-builder-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            IS_RELEASE=true
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_RELEASE="${{ github.event.inputs.publish }}"
            TAG_NAME="v${VERSION}"
          else
            CUR=$(node -p "require('./package.json').version")
            VERSION="${CUR}-dev.${GITHUB_SHA::7}"
            IS_RELEASE=false
            TAG_NAME=""
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Build version::${VERSION} (release=${IS_RELEASE})"

      - name: Sync package.json version
        shell: bash
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build renderer + main
        run: npm run build

      - name: Build Windows installer (NSIS + portable)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts
        shell: bash
        run: |
          echo "=== release/ contents ==="
          ls -la release/ || true
          echo "=== exe files ==="
          find release -maxdepth 2 -name '*.exe' -o -name '*.yml' -o -name '*.blockmap' 2>/dev/null || true

      - name: Upload Electron artifacts (always — full set incl. updater files)
        uses: actions/upload-artifact@v4
        with:
          name: LLSGC-Windows-${{ steps.version.outputs.version }}
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: error
          retention-days: 30

      - name: Build server bundle (for lite zip)
        run: npm run build:server

      - name: Assemble lite zip (for programmers who already have Node 20+)
        shell: bash
        run: |
          STAGE="release/stage/llsgc-server"
          mkdir -p "$STAGE/client"
          cp dist/server/index.js "$STAGE/server.js"
          cp -R dist/. "$STAGE/client/"
          # The renderer bundle is meant to be served at "/", so strip
          # nothing — index.html and assets/ are the only top-level items
          # in dist/. Exclude the server bundle which we copied above.
          rm -f "$STAGE/client/index.js"

          cat > "$STAGE/llsgc-server.cmd" <<'EOF'
          @echo off
          setlocal
          where node >nul 2>nul
          if errorlevel 1 (
            echo.
            echo LLSGC-server requires Node.js 20 or later.
            echo Install from https://nodejs.org/ ^(LTS is fine^), then run this again.
            echo Or grab the desktop installer from the Releases page if you would
            echo rather have the bundled Electron app.
            echo.
            pause
            exit /b 1
          )
          node "%~dp0server.js" %*
          EOF

          cat > "$STAGE/llsgc-server.sh" <<'EOF'
          #!/usr/bin/env bash
          set -e
          if ! command -v node >/dev/null 2>&1; then
            echo "LLSGC-server requires Node.js 20 or later. Install from https://nodejs.org/" >&2
            exit 1
          fi
          DIR="$(cd "$(dirname "$0")" && pwd)"
          exec node "$DIR/server.js" "$@"
          EOF
          chmod +x "$STAGE/llsgc-server.sh"

          cat > "$STAGE/README.txt" <<'EOF'
          LLSGC — Live Local Servers (lite distribution)

          Same control panel as the LLSGC desktop app, but runs as a local
          Node service and opens in your browser. Tiny because Node is not
          bundled — install Node 20+ from https://nodejs.org/ first.

          Run:
            Windows : double-click llsgc-server.cmd
            macOS / Linux : ./llsgc-server.sh

          Then open http://localhost:47291 in your browser (it auto-opens).

          Flags:
            --port <n>       listen on a different port (default 47291)
            --host <ip>      bind address (default 127.0.0.1)
            --no-open        do not auto-open the browser
            --no-auto-start  skip auto-starting saved launchers
          EOF

          VER="${{ steps.version.outputs.version }}"
          (cd release/stage && powershell -Command "Compress-Archive -Path 'llsgc-server' -DestinationPath '../LLSGC-${VER}-lite.zip'")
          rm -rf release/stage
          ls -la release/

      - name: Upload lite zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLSGC-lite-${{ steps.version.outputs.version }}
          path: release/*-lite.zip
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release (desktop .exe + lite zip + auto-update feed)
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: LLSGC ${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            release/*.exe
            release/*-lite.zip
            release/latest.yml
            release/*.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
